name: Run Daily Edition

on:
  schedule:
    # Run every day at 23:30 UTC (which is exactly 5:00 AM IST of the following day)
    - cron: '30 23 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  run-edition:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Fetch Configuration from Red Letter
        run: |
          echo "Fetching config for branch: ${{ github.ref_name }}"
          curl -s -f "https://red-letter-three.vercel.app/api/config?branch=${{ github.ref_name }}" > payload.json

      - name: Set Collection IDs based on Branch
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ARTICLES_COLLECTION_ID=${{ secrets.ARTICLES_COLLECTION_ID }}" >> $GITHUB_ENV
            echo "EDITIONS_COLLECTION_ID=${{ secrets.EDITIONS_COLLECTION_ID }}" >> $GITHUB_ENV
          else
            echo "ARTICLES_COLLECTION_ID=articles_staging" >> $GITHUB_ENV
            echo "EDITIONS_COLLECTION_ID=editions_staging" >> $GITHUB_ENV
          fi


      - name: Run News Gather & Synthesis Phase
        run: npx tsx src/index.ts --config payload.json
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT: ${{ secrets.APPWRITE_PROJECT }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}

      - name: Run Chief Editor Layout Phase
        run: npx tsx src/run-all-editors.ts
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT: ${{ secrets.APPWRITE_PROJECT }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
